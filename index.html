<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Catálogo de Entrevistas - Artistas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<!-- Header fixo com imagem -->
<div class="header-fixo">
    <div class="header-container">
            <img src="imagens/logo-cabecalho.png" alt="Logo" class="cabecalho-img" id="cabecalho-img">
    </div>
</div>

<!-- Espaçador para compensar o header fixo -->
<div class="header-placeholder"></div>

<main>
    <!-- Botão voltar -->
    <div id="btn-voltar-container" style="display: none;">
        <button class="btn-voltar" onclick="voltarParaHome()">← Voltar ao início</button>
    </div>
        <div class="texto-busca">
            ✨ Procure artistas por categoria ou nome ✨
        </div>
    <!-- SEÇÃO 1: Cards principais -->
    <div id="secao-principal" class="secao ativa">
        <div class="container-cards">
            <div class="card-principal" onclick="mostrarCategorias()">
                <div class="card-imagem" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center;">
                    <span style="font-size: 64px;">🎨</span>
                </div>
                <div class="card-conteudo">
                    <h2>Por Categoria</h2>
                    <p>Explore os artistas organizados por sua área de atuação</p>
                </div>
            </div>
            <div class="card-principal" onclick="mostrarNomes()">
                <div class="card-imagem" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); display: flex; align-items: center; justify-content: center;">
                    <span style="font-size: 64px;">📝</span>
                </div>
                <div class="card-conteudo">
                    <h2>Por Nome</h2>
                    <p>Lista completa em ordem alfabética</p>
                </div>
            </div>
            <div class="card-principal" onclick="mostrarEquipe()">
                <div class="card-imagem" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); display: flex; align-items: center; justify-content: center;">
                    <span style="font-size: 64px;">👥</span>
                </div>
                <div class="card-conteudo">
                    <h2>Equipe do Projeto</h2>
                    <p>Conheça quem tornou este catálogo possível</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SEÇÃO 2: Página de Categorias (Accordion) -->
    <div id="secao-categorias" class="secao">
        <div id="accordion-container"></div>
    </div>

    <!-- SEÇÃO 3: Página de Nomes (Lista alfabética) -->
    <div id="secao-nomes" class="secao">
        <div id="lista-nomes-container"></div>
    </div>

    <!-- SEÇÃO 4: Página da Equipe -->
    <div id="secao-equipe" class="secao">
        <h2 style="text-align: center; margin-bottom: 30px;">🌟 Nossa Equipe</h2>
        <div id="equipe-container" class="equipe-grid"></div>
    </div>
</main>

<script src="dados.js"></script>
<script>
    // Ajustar altura do placeholder para compensar o header fixo
    function ajustarHeaderPlaceholder() {
        const headerAltura = document.querySelector('.header-fixo').offsetHeight;
        document.querySelector('.header-placeholder').style.height = headerAltura + 'px';
    }
    
    window.addEventListener('load', ajustarHeaderPlaceholder);
    window.addEventListener('resize', ajustarHeaderPlaceholder);

    // Funções de navegação
    function mostrarCategorias() {
        document.querySelectorAll('.secao').forEach(sec => sec.classList.remove('ativa'));
        document.getElementById('secao-categorias').classList.add('ativa');
        document.getElementById('btn-voltar-container').style.display = 'block';
        renderizarAccordion();
    }
    
    function mostrarNomes() {
        document.querySelectorAll('.secao').forEach(sec => sec.classList.remove('ativa'));
        document.getElementById('secao-nomes').classList.add('ativa');
        document.getElementById('btn-voltar-container').style.display = 'block';
        renderizarListaNomes();
    }
    
    function mostrarEquipe() {
        document.querySelectorAll('.secao').forEach(sec => sec.classList.remove('ativa'));
        document.getElementById('secao-equipe').classList.add('ativa');
        document.getElementById('btn-voltar-container').style.display = 'block';
        renderizarEquipe();
    }
    
    function voltarParaHome() {
        document.querySelectorAll('.secao').forEach(sec => sec.classList.remove('ativa'));
        document.getElementById('secao-principal').classList.add('ativa');
        document.getElementById('btn-voltar-container').style.display = 'none';
    }
    
    // Renderizar Accordion (sanfonado) por categoria
    function renderizarAccordion() {
        const categorias = {};
        artistas.forEach(artista => {
            let cat = artista.categoria;
            if (cat.includes('IN MEMORIAN')) cat = 'ARTES CÊNICAS';
            if (!categorias[cat]) categorias[cat] = [];
            categorias[cat].push(artista);
        });
        
        const categoriasOrdenadas = Object.keys(categorias).sort();
        
        let html = '';
        categoriasOrdenadas.forEach(categoria => {
            const cor = coresCategorias[categoria] || '#95a5a6';
            const artistasOrdenados = categorias[categoria].sort((a,b) => a.nome.localeCompare(b.nome));
            
            let listaArtistas = '';
            artistasOrdenados.forEach(artista => {
                const slug = slugify(artista.nome);
                const ehInMemorian = artista.categoria.includes('IN MEMORIAN');
                const classeMemorian = ehInMemorian ? 'in-memorian' : '';
                const iconeMemorian = ehInMemorian ? '💞 ' : '🎙️ ';
                const nomeExibido = ehInMemorian ? artista.nome.replace(' (IN MEMORIAN)', '') : artista.nome;
                
                listaArtistas += `
                    <a href="artistas/${slug}.html" class="link-artista ${classeMemorian}" style="border-left-color: ${cor}">
                        ${iconeMemorian} ${nomeExibido} ${ehInMemorian ? '<span style="font-size: 12px; background: #c0392b; color: white; padding: 2px 8px; border-radius: 20px; margin-left: 8px;">IN MEMORIAN</span>' : ''}
                    </a>
                `;
            });
            
            html += `
                <div class="accordion-item">
                    <button class="accordion-header" style="background: ${cor}" onclick="toggleAccordion(this)">
                        ${categoria} (${artistasOrdenados.length})
                    </button>
                    <div class="accordion-content">
                        <div class="lista-artistas-accordion">
                            ${listaArtistas}
                        </div>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('accordion-container').innerHTML = html;
    }
    
    function toggleAccordion(btn) {
        const item = btn.closest('.accordion-item');
        item.classList.toggle('active');
    }
    
    // Renderizar lista completa de nomes com tags coloridas
    function renderizarListaNomes() {
        const artistasOrdenados = [...artistas].sort((a,b) => a.nome.localeCompare(b.nome));
        
        let html = '<div class="lista-todos-artistas">';
        artistasOrdenados.forEach(artista => {
            let categoriaBase = artista.categoria;
            const isMemorian = categoriaBase.includes('IN MEMORIAN');
            if (isMemorian) categoriaBase = 'ARTES CÊNICAS';
            
            const cor = coresCategorias[categoriaBase] || '#95a5a6';
            const slug = slugify(artista.nome);
            const nomeExibido = isMemorian ? artista.nome.replace(' (IN MEMORIAN)', '') + ' 💞' : artista.nome;
            
            html += `
                <a href="artistas/${slug}.html" class="item-artista" ${isMemorian ? 'style="background: #fff3f3; border-left: 4px solid #c0392b;"' : ''}>
                    <span class="nome-artista">${isMemorian ? '🕊️ ' : '🎙️ '} ${nomeExibido}</span>
                    <span class="tag-categoria" style="background: ${cor}">${categoriaBase} ${isMemorian ? '• IN MEMORIAN' : ''}</span>
                </a>
            `;
        });
        html += '</div>';
        
        document.getElementById('lista-nomes-container').innerHTML = html;
    }
    
    // Renderizar equipe com grid otimizado
    function renderizarEquipe() {
        const equipe = [
            { nome: "Nome do Coordenador", funcao: "Coordenação Geral", descricao: "Descrição do trabalho e contribuição.", icone: "🎯" },
            { nome: "Nome do Pesquisador 1", funcao: "Pesquisa e Curadoria", descricao: "Responsável pela seleção e organização dos artistas.", icone: "📚" },
            { nome: "Nome do Pesquisador 2", funcao: "Pesquisa e Curadoria", descricao: "Responsável pela seleção e organização dos artistas.", icone: "🔍" },
            { nome: "Nome do Designer", funcao: "Design Gráfico", descricao: "Criação visual do catálogo e materiais.", icone: "🎨" },
            { nome: "Nome do Desenvolvedor", funcao: "Desenvolvimento Web", descricao: "Implementação técnica do site e manutenção.", icone: "💻" },
            { nome: "Nome do Produtor", funcao: "Produção Executiva", descricao: "Gestão do projeto e parcerias.", icone: "🎬" },
            { nome: "Nome do Entrevistador", funcao: "Entrevistas", descricao: "Condução das entrevistas com os artistas.", icone: "🎙️" },
            { nome: "Nome do Fotógrafo", funcao: "Registro Fotográfico", descricao: "Registro das imagens e making of.", icone: "📸" }
        ];
        
        let html = '';
        equipe.forEach(membro => {
            html += `
                <div class="membro-card">
                    <div class="membro-foto placeholder">
                        ${membro.icone}
                    </div>
                    <div class="membro-info">
                        <div class="membro-nome">${membro.nome}</div>
                        <div class="membro-funcao">${membro.funcao}</div>
                        <div class="membro-descricao">${membro.descricao}</div>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('equipe-container').innerHTML = html;
    }
    
    // Abrir accordion específico via URL
    function abrirCategoriaNaURL() {
        const params = new URLSearchParams(window.location.search);
        const categoria = params.get('categoria');
        if (categoria) {
            mostrarCategorias();
            setTimeout(() => {
                const items = document.querySelectorAll('.accordion-item');
                for (let item of items) {
                    const header = item.querySelector('.accordion-header');
                    if (header.textContent.startsWith(decodeURIComponent(categoria))) {
                        item.classList.add('active');
                        const content = item.querySelector('.accordion-content');
                        if (content) {
                            content.style.maxHeight = content.scrollHeight + 'px';
                        }
                        header.scrollIntoView({ behavior: 'smooth' });
                        break;
                    }
                }
            }, 100);
        }
    }
    
    window.addEventListener('load', () => {
        ajustarHeaderPlaceholder();
        abrirCategoriaNaURL();
    });
</script>
</body>
</html>
